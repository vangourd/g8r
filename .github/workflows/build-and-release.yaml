name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - stable

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true
    
    - name: Build
      run: |
        cargo build --release
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v2
      with:
        name: g8r
        path: target/release/g8r

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - uses: actions/download-artifact@v2
      with:
        name: g8r
        path: target/release

    # - name: Create Stable Release
    #   if: startsWith(github.ref, 'refs/tags/stable')
    #   id: create_stable_release
    #   uses: actions/create-release@v1
    #   env:
    #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    #   with:
    #     tag_name: stable
    #     release_name: Release ${{ github.ref }} (Stable)
    #     draft: false
    #     prerelease: false
    #     body: "Description of release"

    # - name: Upload Stable Release
    #   uses: actions/upload-release-asset@v1
    #   env:
    #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    #   with:
    #     upload_url: ${{ github.event.release.upload_url }}
    #     asset_path: ./target/release/g8r
    #     asset_name: g8r
    #     asset_content_type: application/octet-stream
    
    - name: Create Latest Release
      id: create_latest_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.run_number }}
        release_name: Release ${{ github.run_number }}
        draft: true

    - name: Upload Release Asset
      id: upload-release-asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ create_latest_release.outputs.upload_url }}
        asset_path: './target/release/g8r'
        asset_name: g8r
        asset_content_type: applicaton/octet-stream